name: daily-hail-swaths
on:
  schedule:
    - cron: '0 9 * * *'      # ~09:00 UTC daily, after the prior day's MESH settles
  workflow_dispatch:
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install rasterio numpy shapely
      - name: Process recent MRMS MESH days
        env:
          STORM_KEY: ${{ secrets.STORM_KEY }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
        run: |
          for i in 1 2 3; do
            D=$(date -u -d "-$i day" +%Y-%m-%d)
            echo "== $D =="
            python process_mesh.py "$D" || true
          done
