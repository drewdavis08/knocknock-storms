name: daily-hail-swaths
on:
  schedule:
    # 14:00 UTC daily. The 12Z→12Z convective day for date D is read from the MESH file
    # valid 12:00 UTC on D+1, so we must run after 12Z for "yesterday" to be available.
    - cron: '0 14 * * *'
  workflow_dispatch:
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install rasterio numpy shapely
      - name: Process recent MRMS MESH days (12Z convective day)
        env:
          STORM_KEY: ${{ secrets.STORM_KEY }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
        run: |
          for i in 1 2 3; do
            D=$(date -u -d "-$i day" +%Y-%m-%d)
            echo "== $D =="
            python process_mesh.py "$D" || true
          done
